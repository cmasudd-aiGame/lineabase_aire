<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Observatorio de Aire - Santiago</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            width: 100%;
            height: 300px;
            background-image: url('https://cmasudd-aigame.github.io/lineabase_aire/santiago.png');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }
        h1 {
            font-size: 3rem;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .map-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .map-card h2 {
            padding: 10px;
            margin: 0;
            font-size: 1.2rem;
            background: #333;
            color: #fff;
            text-align: center;
        }
        iframe {
            width: 100%;
            height: 500px;
            border: none;
        }
    </style>
</head>
<body>

<header>
    <h1>Observatorio de Aire Santiago</h1>
</header>

<div class="container">
    <div class="map-card">
        <h2>Monóxido de Carbono (CO)</h2>
        <iframe src="https://cmas-473117.projects.earthengine.app/view/santiagoco"></iframe>
    </div>

    <div class="map-card">
        <h2>Dióxido de Nitrógeno (NO2)</h2>
        <iframe src="https://cmas-473117.projects.earthengine.app/view/santiagono2"></iframe>
    </div>

    <div class="map-card">
        <h2>Metano (CH4)</h2>
        <iframe src="https://cmas-473117.projects.earthengine.app/view/santiagoch4"></iframe>
    </div>

    <div class="map-card">
        <h2>Ozono (O3)</h2>
        <iframe src="https://cmas-473117.projects.earthengine.app/view/santiago03"></iframe>
    </div>

    <div class="map-card">
        <h2>Dióxido de Azufre (SO2)</h2>
        <iframe src="https://cmas-473117.projects.earthengine.app/view/santiagoso2"></iframe>
    </div>
</div>

</body>
</html>
